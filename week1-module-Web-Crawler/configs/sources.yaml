sources:
  - source_id: ems_policy_network
    company: 中国邮政 EMS
    source_type: 官方服务网络
    country_region: 中国
    base_url: https://www.ems.com.cn
    allowed_domains:
      - ems.com.cn
      - nmc.ems.com.cn
      - my.ems.com.cn
      - int.ems.com.cn
    entry_urls:
      - https://www.ems.com.cn/
      - https://www.ems.com.cn/insured
      - https://www.ems.com.cn/mail_compensation
      - https://www.ems.com.cn/Taboo_items
      - https://www.ems.com.cn/services_support
      - https://www.ems.com.cn/complaints
      - https://www.ems.com.cn/freight_prescription
      - http://nmc.ems.com.cn:9096/imcloud/static/lead.html
      - https://my.ems.com.cn/pcp-web/f/pcp/indexController/toquoteindex
      - http://int.ems.com.cn/mailtax
    api_endpoints:
      - name: 11183_online_service_faq_channel_0
        url: http://nmc.ems.com.cn:9096/imcloud/commonFAQ/getListByChannel
        method: POST
        json:
          channel: 0
      - name: 11183_online_service_faq_channel_1
        url: http://nmc.ems.com.cn:9096/imcloud/commonFAQ/getListByChannel
        method: POST
        json:
          channel: 1
      - name: 11183_online_service_faq_channel_3
        url: http://nmc.ems.com.cn:9096/imcloud/commonFAQ/getListByChannel
        method: POST
        json:
          channel: 3
      - name: 11183_online_service_faq_channel_4
        url: http://nmc.ems.com.cn:9096/imcloud/commonFAQ/getListByChannel
        method: POST
        json:
          channel: 4
    allowed_topics:
      - 服务条款
      - 禁限寄
      - 国际清关
      - 邮寄保险
      - 保价赔付
      - 包装要求
      - 投诉申诉
      - 产品服务
      - 时限标准
      - 资费规则
