# =============================================================================
# post_ai configuration
# =============================================================================
#
# This file belongs to the standalone AI toolkit only.
# Django must keep its own settings module and should not mix web/database
# settings into this file.
#
# mode options:
# - local: local debugging mode. The default vector provider is FAISS.
# - microservice: formal service mode. The default vector provider is pgvector.
# POST_AI_VECTOR_PROVIDER may still override the mode default for temporary
# troubleshooting.
mode: microservice

# -----------------------------------------------------------------------------
# Mode switch
# -----------------------------------------------------------------------------
# The selected mode is the main switch. Keep concrete services here so the
# runtime shape is visible from this file.
modes:
  local:
    database: local-artifacts
    vector_store:
      provider: faiss
    chat:
      provider: ollama
      model: gpt-oss:20b
    embedding:
      provider: ollama
      model: qwen3-embedding:8b
  microservice:
    database: postgresql
    vector_store:
      provider: pgvector
    chat:
      provider: ollama
      model: gpt-oss:20b
    embedding:
      provider: ollama
      model: qwen3-embedding:8b

# -----------------------------------------------------------------------------
# Data sources
# -----------------------------------------------------------------------------
# Source data used by the AI toolkit before Django ingestion.
data:
  data_dir: ../data

# -----------------------------------------------------------------------------
# Local artifacts
# -----------------------------------------------------------------------------
# Runtime artifacts created by post_ai, such as FAISS indexes.
artifacts:
  artifact_dir: artifacts

# -----------------------------------------------------------------------------
# Model selection
# -----------------------------------------------------------------------------
# All model calls go through provider adapters. Business logic should never call
# Ollama, vLLM, OpenRouter, or a custom FastAPI service directly.
models:
  chat:
    provider: ollama
    model: gpt-oss:20b
  embedding:
    provider: ollama
    model: qwen3-embedding:8b
  sft:
    provider: fastapi
    model: qwen2.5-3b-lora-r1

# -----------------------------------------------------------------------------
# Model providers
# -----------------------------------------------------------------------------
# Provider-specific connection settings. Empty values mean the provider exists as
# a placeholder but is not currently usable.
providers:
  ollama:
    base_url: http://localhost:11434
  vllm:
    base_url:
  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key:
  fastapi:
    base_url: http://127.0.0.1:18731/v1

# -----------------------------------------------------------------------------
# Vector store provider
# -----------------------------------------------------------------------------
# Runtime vector provider is controlled by mode as the main switch:
# - mode: local -> modes.local.vector_store.provider
# - mode: microservice -> modes.microservice.vector_store.provider
#
# Provider-specific settings stay below. Do not set a top-level provider here;
# use mode or POST_AI_VECTOR_PROVIDER instead.
vector_store:
  faiss:
    artifact_dir: artifacts/faiss
    index_file: postal.faiss
    metadata_file: postal_metadata.json
  pgvector:
    dsn:
    table: core_postalembedding
