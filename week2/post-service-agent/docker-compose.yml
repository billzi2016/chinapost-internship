services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: post-service-postgres
    environment:
      POSTGRES_DB: post_service_agent
      POSTGRES_USER: post_service
      POSTGRES_PASSWORD: post_service
    ports:
      - "5432:5432"
    volumes:
      - ./.docker/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U post_service -d post_service_agent"]
      interval: 5s
      timeout: 5s
      retries: 12
