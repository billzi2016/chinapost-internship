# Qwen2.5 3B 的 MLX LoRA 配置。
# 参数名按 mlx-lm 官方 lora_config.yaml 写法设置。

model: "Qwen/Qwen2.5-3B-Instruct"
train: true
fine_tune_type: lora
optimizer: adamw
data: "./data"
seed: 42

# 3B 用于快速验证数据、训练流程和评估闭环。
num_layers: 16
batch_size: 4
iters: 800
val_batches: -1
learning_rate: 1e-5
steps_per_report: 10
steps_per_eval: 100
grad_accumulation_steps: 1
resume_adapter_file: null
adapter_path: "./adapters/qwen2.5-3b"
save_every: 100
test: false
test_batches: -1
max_seq_length: 2048
grad_checkpoint: true

lora_parameters:
  keys: ["self_attn.q_proj", "self_attn.v_proj"]
  rank: 8
  scale: 16.0
  dropout: 0.05
