# Qwen2.5 7B 的 MLX LoRA 配置。
# 7B 是主交付候选，参数比 3B 更保守，避免训练初期内存压力过大。

model: "Qwen/Qwen2.5-7B-Instruct"
train: true
fine_tune_type: lora
optimizer: adamw
data: "./data"
seed: 42

num_layers: 24
batch_size: 2
iters: 1000
val_batches: -1
learning_rate: 1e-5
steps_per_report: 10
steps_per_eval: 100
grad_accumulation_steps: 1
resume_adapter_file: null
adapter_path: "./adapters/qwen2.5-7b"
save_every: 100
test: false
test_batches: -1
max_seq_length: 2048
grad_checkpoint: true

lora_parameters:
  keys: ["self_attn.q_proj", "self_attn.v_proj"]
  rank: 16
  scale: 32.0
  dropout: 0.05
