site_name: ChinaPost Internship Docs
site_description: Reconstructed documentation site for the China Post internship project
site_url: https://billzi2016.github.io/chinapost-internship/
repo_url: https://github.com/billzi2016/chinapost-internship
repo_name: billzi2016/chinapost-internship

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - include-markdown
  - i18n:
      docs_structure: folder
      languages:
        - locale: zh
          default: true
          name: 中文
          build: true
          nav:
            - 首页: index.md
            - 项目总览: project-overview.md
            - Django 系统与接口: django-system.md
            - RAG 方案: rag-architecture.md
            - 推理部署: inference-serving.md
            - LoRA 原理: lora-basics.md
            - SFT 说明: sft-basics.md
            - 报告索引: reports-index.md
            - Step1 报告 / 模型选型: report-step1-model-selection.md
            - Step1 报告 / SFT 风险控制: report-step1-sft-risk.md
            - Step1 报告 / CSDS 统计: report-step1-csds-stats.md
            - Step1 报告 / 邮政对话筛选: report-step1-postal-filter.md
            - Step1 报告 / 分类评估: report-step1-classification-cases.md
            - Step1 报告 / 聚类与标签优化: report-step1-cluster-labels.md
            - Step2 报告 / 训练样本: report-step2-training-samples.md
            - Step2 报告 / 系统设计: report-step2-llm-system-design.md
            - Step3 报告 / 微调完整实验: report-step3-qwen25-full.md
            - Step3 报告 / 3B Rank Sweep: report-step3-qwen25-3b-rank-sweep.md
            - Step3 报告 / 7B Rank Sweep: report-step3-qwen25-7b-rank-sweep.md
            - 训练样本全量页: training-samples-full.md
            - 重建说明: rebuild-note.md
            - 模型微调结论: model-training.md
        - locale: en
          name: English
          build: true
          nav:
            - Home: index.md
            - Project Overview: project-overview.md
            - Django System and APIs: django-system.md
            - RAG Architecture: rag-architecture.md
            - Inference Serving: inference-serving.md
            - LoRA Basics: lora-basics.md
            - SFT Basics: sft-basics.md
            - Reports Index: reports-index.md
            - Step1 / Model Selection Report: report-step1-model-selection.md
            - Step1 / SFT Risk Report: report-step1-sft-risk.md
            - Step1 / CSDS Statistics Report: report-step1-csds-stats.md
            - Step1 / Postal Filtering Report: report-step1-postal-filter.md
            - Step1 / Classification Report: report-step1-classification-cases.md
            - Step1 / Cluster and Label Report: report-step1-cluster-labels.md
            - Step2 / Training Samples Report: report-step2-training-samples.md
            - Step2 / LLM System Design Report: report-step2-llm-system-design.md
            - Step3 / Full Fine-Tuning Report: report-step3-qwen25-full.md
            - Step3 / 3B Rank Sweep Report: report-step3-qwen25-3b-rank-sweep.md
            - Step3 / 7B Rank Sweep Report: report-step3-qwen25-7b-rank-sweep.md
            - Full Training Samples: training-samples-full.md
            - Rebuild Notes: rebuild-note.md
            - LoRA Summary: model-training.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - fenced_code
  - toc:
      permalink: true

docs_dir: docs
